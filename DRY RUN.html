<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Fuel Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .calculator {
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            width: 300px;
            background-color: #f9f9f9;
        }
        input[type="number"] {
            width: calc(100% - 10px);
            padding: 5px;
            margin: 5px 0;
        }
        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>Fuel Cost Calculator</h2>
        <label for="distance">Distance (miles)</label>
        <input type="number" id="distance" placeholder="Enter distance">

        <label for="efficiency">Fuel Efficiency (MPG)</label>
        <input type="number" id="efficiency" placeholder="Enter efficiency">

        <label for="fuelPrice">Fuel Price ($/gallon)</label>
        <input type="number" id="fuelPrice" placeholder="Enter fuel price">

        <button onclick="calculateFuelCost()">Calculate</button>

        <h3 id="result"></h3>
    </div>

    <script>
        function calculateFuelCost() {
            var distance = document.getElementById('distance').value;
            var efficiency = document.getElementById('efficiency').value;
            var fuelPrice = document.getElementById('fuelPrice').value;
            
            if (distance && efficiency && fuelPrice) {
                var cost = (distance / efficiency) * fuelPrice;
                document.getElementById('result').innerText = 'Total Fuel Cost: $' + cost.toFixed(2);
            } else {
                alert('Please fill in all fields.');
            }
        }
    </script>
</body>
</html>
